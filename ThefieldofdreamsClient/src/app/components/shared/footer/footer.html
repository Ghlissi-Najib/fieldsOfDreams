<footer class="fod-footer">
  <div class="container fod-footer-inner">
    <!-- Main footer content -->
    <div class="row justify-content-between align-items-start gy-4 py-4">
      <!-- Left part: Brand & tagline -->
      <div class="col-12 col-md-4">
        <div class="fod-footer-logo">
          The Field <span class="fod-footer-accent">of Dreams</span>
        </div>
        <p class="fod-footer-tagline mt-2">
          <i class="bi bi-quote fod-quote-icon"></i>
          {{ quoteText }}
          <cite class="d-block mt-1">— {{ quoteAuthor }}</cite>
        </p>
      </div>

      <!-- Right part: Dynamic links columns -->
      <div class="col-6 col-md-2" *ngFor="let column of footerLinks">
        <h6 class="fod-links-heading">
          <i class="bi" [ngClass]="column.icon"></i> {{ column.title }}
        </h6>
        <ul class="fod-links-list">
          <li *ngFor="let link of column.links">
            <a [routerLink]="link.route" *ngIf="link.route; else hrefLink" (click)="closeMenu()">
              <i class="bi" [ngClass]="link.icon"></i> {{ link.label }}
            </a>
            <ng-template #hrefLink>
              <a [href]="link.href" target="_blank" rel="noopener noreferrer">
                <i class="bi" [ngClass]="link.icon"></i> {{ link.label }}
              </a>
            </ng-template>
          </li>
        </ul>
      </div>
    </div>

    <!-- Divider -->
    <div class="fod-footer-divider"></div>

    <!-- Bottom bar: Social icons + Copyright -->
    <div class="d-flex flex-wrap justify-content-between align-items-center py-3 gap-3">
      <!-- Social icons (left part) -->
      <div class="fod-social-icons d-flex gap-2">
        <a *ngFor="let social of socialLinks"
           [href]="social.url"
           target="_blank"
           rel="noopener noreferrer"
           class="fod-social-btn"
           [attr.aria-label]="social.name">
          <i class="bi" [ngClass]="social.icon"></i>
        </a>
      </div>

      <!-- Copyright (right part) -->
      <p class="fod-footer-copy mb-0">
        &copy; {{ currentYear }} {{ siteName }}. Made with
        <i class="bi bi-heart-fill fod-heart-icon"></i> in {{ location }}.
      </p>
    </div>
  </div>
</footer>
