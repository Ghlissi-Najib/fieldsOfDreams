services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: thefieldofdreams-postgres
    environment:
      POSTGRES_DB: Thefieldofdreams
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Admin@2026
    ports:
      - "5432:5432"
    volumes:
      - thefieldofdreams_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  thefieldofdreams_pgdata:
